      <path d="M0 100 l5 -5 5 5 -5 5 z" fill="#2da44e"/>
      <text x="24" y="106">可检索、可推理的知识结构</text>
      <path d="M0 134 l5 -5 5 5 -5 5 z" fill="#2da44e"/>
      <text x="24" y="140">真正可编辑、可复用的 PPT</text>
      <path d="M540 100 l5 -5 5 5 -5 5 z" fill="#2da44e"/>
      <text x="564" y="106">任务流程封装</text>
      <path d="M540 134 l5 -5 5 5 -5 5 z" fill="#2da44e"/>
      <text x="564" y="140">真实可用的 AI 工具</text>
    </g>
  </g>

