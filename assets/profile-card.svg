    <circle cx="186" cy="96" r="78" stroke="#aceebb" stroke-opacity="0.5" fill="none"/>

    <!-- edges -->
    <g stroke="#4ac26b" stroke-opacity="0.6" stroke-width="1.4">
      <path d="M70 130 L140 70"/>
      <path d="M140 70 L210 110"/>
      <path d="M210 110 L300 56"/>
      <path d="M210 110 L280 156"/>
      <path d="M210 110 L150 178"/>
      <path d="M300 56 L350 128"/>
      <path d="M140 70 L96 40"/>
      <path d="M350 128 L370 70"/>
