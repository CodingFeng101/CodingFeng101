    <rect x="0" y="20" width="6" height="16" rx="3" fill="#2da44e"/>
    <text x="22" y="33" fill="#1a7f37" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="15" font-weight="700">研究 · 背景</text>
    <text x="122" y="33" fill="#59636e" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="15">TKDE 在投：Human-LLM 协同领域知识图谱构建　·　授权发明专利：知识图谱搜索方法及系统</text>
  </g>
  <g transform="translate(84 770)">
