    <rect x="0" y="20" width="6" height="16" rx="3" fill="#2dd4bf"/>
    <text x="20" y="33" fill="#5eead4" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="14" font-weight="700">研究 · 背景</text>
    <text x="116" y="33" fill="#9aa7bd" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="14">TKDE 在投：Human-LLM 协同领域知识图谱构建　·　授权发明专利：知识图谱搜索方法及系统</text>
