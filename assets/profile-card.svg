    <circle cx="140" cy="70" r="8" fill="#2da44e"/>
    <circle cx="300" cy="56" r="7" fill="#2da44e"/>
    <circle cx="350" cy="128" r="7" fill="#4ac26b"/>
    <circle cx="280" cy="156" r="6" fill="#4ac26b"/>
    <circle cx="150" cy="178" r="5" fill="#6fdd8b"/>
