      <circle cx="252" cy="106" r="2.6" fill="#f4c95d"/><text x="268" y="111">AI Skill 任务封装</text>
      <circle cx="252" cy="134" r="2.6" fill="#f4c95d"/><text x="268" y="139">工作流自动化</text>
