<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0f1c"/>
      <stop offset="0.55" stop-color="#0b1322"/>
      <stop offset="1" stop-color="#080c16"/>
    </linearGradient>
    <radialGradient id="auroraTeal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 150) rotate(120) scale(360 300)">
      <stop stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 690) rotate(-40) scale(320 260)">
      <stop stop-color="#f4c95d" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#f4c95d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 400) scale(720 480)">
      <stop offset="0.7" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <linearGradient id="tagline" x1="84" y1="0" x2="640" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <radialGradient id="nodeHaloA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) scale(34)">
      <stop stop-color="#5eead4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeHaloG" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) scale(30)">
      <stop stop-color="#f4c95d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4c95d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
