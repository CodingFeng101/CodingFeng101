      <circle cx="4" cy="138" r="2.8" fill="#2da44e"/><text x="22" y="143">图谱增强问答</text>
      <circle cx="4" cy="168" r="2.8" fill="#2da44e"/><text x="22" y="173">实体关系组织</text>
