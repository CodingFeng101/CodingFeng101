  <text x="60" y="152" fill="#1a7f37" font-family="'Geist','Outfit','SF Pro Display','Segoe UI',-apple-system,Arial,sans-serif" font-size="19" font-weight="600" letter-spacing="0.5">AI Tool Builder · Knowledge Systems · Creative Systems</text>
