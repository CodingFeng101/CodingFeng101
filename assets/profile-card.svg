      <stop stop-color="#2da44e" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#2da44e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="24" gradientUnits="userSpaceOnUse">
