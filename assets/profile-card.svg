  <rect width="1200" height="800" rx="24" fill="url(#auroraTeal)"/>
  <rect width="1200" height="800" rx="24" fill="url(#auroraGold)"/>
  <rect width="1200" height="800" rx="24" fill="url(#vignette)"/>
  <rect x="0.75" y="0.75" width="1198.5" height="798.5" rx="23.25" stroke="#23304a" stroke-opacity="0.9"/>
  <rect x="1.75" y="1.75" width="1196.5" height="796.5" rx="22.25" stroke="#2dd4bf" stroke-opacity="0.10"/>

  <!-- ===== Header ===== -->
