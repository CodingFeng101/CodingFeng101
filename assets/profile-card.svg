    <text x="22" y="7" fill="#1a7f37" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="15" font-weight="700">技术栈</text>
    <text x="122" y="7" fill="#59636e" font-family="'Geist Mono','JetBrains Mono','SF Mono',Consolas,monospace" font-size="14.5" letter-spacing="0.3">Python · TypeScript · React · Vite · FastAPI · Node.js · MySQL · Neo4j · Docker</text>
