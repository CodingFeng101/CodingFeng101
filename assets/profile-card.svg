      <circle cx="4" cy="138" r="2.8" fill="#2da44e"/><text x="22" y="143">可编辑 PowerPoint 生成</text>
      <circle cx="4" cy="168" r="2.8" fill="#2da44e"/><text x="22" y="173">多画布 AI 创作</text>
      <circle cx="258" cy="108" r="2.8" fill="#2da44e"/><text x="276" y="113">AI Skill 任务封装</text>
      <circle cx="258" cy="138" r="2.8" fill="#2da44e"/><text x="276" y="143">工作流自动化</text>
