  </defs>

  <!-- Card surface: native GitHub light, no floating box -->
  <rect width="1200" height="800" rx="8" fill="#ffffff"/>
  <rect width="1200" height="800" rx="8" fill="url(#wash)"/>

  <!-- ===== Header ===== -->
  <text x="84" y="158" fill="#1f2328" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Hiragino Sans',sans-serif" font-size="58" font-weight="800" letter-spacing="0.5">你好，我是冯国栋</text>
  <text x="84" y="208" fill="#1a7f37" font-family="'Geist','Outfit','SF Pro Display','Segoe UI',-apple-system,Arial,sans-serif" font-size="23" font-weight="600" letter-spacing="0.6">AI Tool Builder · Knowledge Systems · Creative Systems</text>
  <text x="84" y="254" fill="#59636e" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Hiragino Sans',sans-serif" font-size="20">我关注如何把知识、内容和想法，变成结构化、可编辑、可使用的 AI 工具。</text>

  <!-- Constellation hero -->
  <g transform="translate(742 56)">
